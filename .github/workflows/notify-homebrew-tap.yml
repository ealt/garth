name: Notify homebrew tap

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to send to the tap workflow, for example v0.3.1. Leave empty to use the release event tag."
        required: false
        type: string

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          release_tag="${INPUT_RELEASE_TAG:-}"
          if [[ -z "${release_tag}" && -n "${EVENT_RELEASE_TAG:-}" ]]; then
            release_tag="${EVENT_RELEASE_TAG}"
          fi

          if [[ -z "${release_tag}" ]]; then
            echo "release_tag input is required when this workflow is run manually." >&2
            exit 1
          fi

          if [[ "${release_tag}" != v* ]]; then
            release_tag="v${release_tag}"
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch update to homebrew-tap
        env:
          # Fine-grained PAT for ealt/homebrew-tap with Contents: Read and write.
          DISPATCH_TOKEN: ${{ secrets.HOMEBREW_TAP_FINE_GRAINED_PAT }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "Missing HOMEBREW_TAP_FINE_GRAINED_PAT secret for ealt/homebrew-tap." >&2
            exit 1
          fi

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ealt/homebrew-tap/dispatches \
            -d "$(printf '{"event_type":"garth_release_published","client_payload":{"release_tag":"%s"}}' "${RELEASE_TAG}")"
