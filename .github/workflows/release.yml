name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping release"
            exit 1
          fi

      - name: Lint and test
        run: make check

      - name: Build release tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tar -czf "garth-${VERSION}.tar.gz" \
            --transform "s,^,garth-${VERSION}/," \
            bin/garth lib/* docker/* config.example.toml \
            templates/* VERSION LICENSE README.md CHANGELOG.md

      - name: Compute SHA256 checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: sha256sum "garth-${VERSION}.tar.gz" > "garth-${VERSION}.tar.gz.sha256"

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            garth-${{ steps.version.outputs.version }}.tar.gz
            garth-${{ steps.version.outputs.version }}.tar.gz.sha256
