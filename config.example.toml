[defaults]
agents = ["claude", "codex"]
sandbox = "docker"
network = "bridge"
workspace = "auto"
safety_mode = "safe"
docker_image_prefix = "garth"
auth_passthrough = []
default_branch = "main"

[token_refresh]
enabled = true
lead_time = "15m"
failure_retry_window = "10m"
retry_backoff = "exponential"
retry_initial_interval = "5s"
retry_max_interval = "60s"

[github_app]
app_id_ref = "op://<VAULT>/GitHub App/app-id"
private_key_ref = "op://<VAULT>/GitHub App/private-key"
installation_strategy = "by_owner"
installation_id_ref = ""
installation_id_map = {}

[chrome]
# Set to "" to use your default signed-in Chrome profile.
profiles_dir = "~/Library/Application Support/Chrome-ProjectProfiles"
# Optional when profiles_dir = "": force a specific Chrome profile directory
# (for example "Default" or "Profile 2"). Empty means auto-detect last used.
profile_directory = ""

[features]
# Optional packages to include when building agent images.
# Package names are treated as apt packages, except "uv" and "bun"
# which use their upstream installer scripts.
packages = []
# Optional host mounts for agent containers.
# Each entry can be:
# - a string path (mounted read-only at same absolute path), or
# - a table: { host_path = "...", container_path = "...", mode = "ro|rw" }
mounts = []

[security]
# Host-side paths under the worktree to overlay as read-only in containers.
protected_paths = [".git/hooks", ".git/config", ".github", ".gitmodules"]
# Relative to repo root unless absolute.
seccomp_profile = "docker/seccomp-profile.json"

[security.auth_mount_mode]
# Mount mode controls for auth passthrough paths (ro|rw).
# Paths that contain installed binaries or config should be "ro" to prevent
# container auto-updaters from overwriting host files with wrong-platform
# binaries.  Only paths that need container writes should be "rw".
codex_dot_codex = "rw"
claude_dot_claude = "ro"
claude_config = "ro"
claude_state = "rw"
claude_share = "ro"
claude_cache = "rw"

[agents.claude]
base_command = "claude"
safe_args = []
permissive_args = ["--dangerously-skip-permissions"]
api_key_env = "ANTHROPIC_API_KEY"
api_key_ref = "op://<VAULT>/Anthropic/api-key"

[agents.codex]
base_command = "codex"
safe_args = []
permissive_args = ["--dangerously-bypass-approvals-and-sandbox"]
api_key_env = "OPENAI_API_KEY"
api_key_ref = "op://<VAULT>/OpenAI/api-key"

[agents.opencode]
base_command = "opencode"
safe_args = []
permissive_args = []
api_key_env = "OPENAI_API_KEY"
api_key_ref = "op://<VAULT>/OpenAI/api-key"

[agents.gemini]
base_command = "gemini"
safe_args = []
permissive_args = ["--yolo"]
api_key_env = "GOOGLE_API_KEY"
api_key_ref = "op://<VAULT>/Google AI/api-key"
