[defaults]
agents = ["claude", "codex"]
sandbox = "docker"                     # "docker", "none"
network = "bridge"                     # "bridge", "none"
safety_mode = "permissive"             # "safe", "permissive"
docker_image_prefix = "garth"
auth_passthrough = ["claude", "codex"]
terminal_launcher = "auto"             # "auto", "current_shell", "ghostty", "ghostty_app", "terminal"
zellij_mouse_mode = "enabled"          # "enabled", "disabled"

[token_refresh]
enabled = true
lead_time = "15m"
failure_retry_window = "10m"
retry_backoff = "exponential"   # "exponential", "fixed"
retry_initial_interval = "5s"
retry_max_interval = "60s"
cache_github_app_secrets = true
background_auto_signin = false

[github_app]
app_id_ref = "op://<VAULT>/GitHub App/app-id"
private_key_ref = "op://<VAULT>/GitHub App/private-key"
installation_strategy = "by_owner"                       # "single", "static_map", "by_owner"
installation_id_ref = "op://<VAULT>/GitHub App/installation-id"
installation_id_map = {}

[browser]
engine = "chromium"                                                   # "chromium", "firefox", "open", "none"
app = "Google Chrome"
profiles_dir = "~/Library/Application Support/Chrome-ProjectProfiles"

[features]
# Optional packages to include when building agent images.
# Package names are treated as apt packages, except "uv" and "bun"
# which use their upstream installer scripts.
packages = ["neovim", "uv", "bun", "shellcheck"]
# Optional global npm packages to install in all selected agent images.
# Supports unscoped names ("typescript") and scoped names ("@biomejs/biome").
npm_packages = []
# Optional host mounts for agent containers.
# Each entry can be:
# - a string path (mounted read-only at same absolute path), or
# - a table: { host_path = "...", container_path = "...", mode = "ro|rw" }
# Mount Codex OAuth tokens so agents with @openai/codex installed can authenticate.
# Run 'codex login' on the host first.
mounts = [
  { host_path = "~/.codex", container_path = "/home/agent/.codex", mode = "rw" },
  { host_path = "~/.config/nvim", container_path = "/home/agent/.config/nvim", mode = "ro" },
]

[security]
# Host-side paths under the worktree to overlay as read-only in containers.
protected_paths = [".git/hooks", ".git/config", ".github", ".gitmodules"]
# Relative to repo root unless absolute.
seccomp_profile = "docker/seccomp-profile.json"

[security.auth_mount_mode]
# Mount mode controls for auth passthrough paths (ro|rw).
# Paths that contain installed binaries or config should be "ro" to prevent
# container auto-updaters from overwriting host files with wrong-platform
# binaries.  Only paths that need container writes should be "rw".
codex_dot_codex = "rw"
claude_dot_claude = "rw"
claude_config = "rw"
claude_state = "rw"
claude_share = "ro"
claude_cache = "rw"

[agents.claude]
base_command = "claude"
safe_args = []
permissive_args = ["--dangerously-skip-permissions"]
api_key_env = "ANTHROPIC_API_KEY"
# Optional when using local CLI auth via defaults.auth_passthrough or sandbox=none.
api_key_ref = ""
packages = []
npm_packages = ["@openai/codex"]

[agents.codex]
base_command = "codex"
safe_args = []
permissive_args = ["--dangerously-bypass-approvals-and-sandbox"]
api_key_env = "OPENAI_API_KEY"
api_key_ref = ""
packages = []
npm_packages = []

[agents.opencode]
base_command = "opencode"
safe_args = []
permissive_args = []
api_key_env = "OPENAI_API_KEY"
api_key_ref = ""
packages = []
npm_packages = []

[agents.gemini]
base_command = "gemini"
safe_args = []
permissive_args = ["--yolo"]
api_key_env = "GOOGLE_API_KEY"
api_key_ref = ""
packages = []
npm_packages = []
