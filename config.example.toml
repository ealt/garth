[defaults]
agents = ["claude", "codex"]
sandbox = "docker"
network = "bridge"
workspace = "auto"
safety_mode = "safe"
docker_image_prefix = "garth"
auth_passthrough = []
default_branch = "main"
# macOS launcher preference for opening zellij:
# auto | current_shell | ghostty | ghostty_app | terminal
terminal_launcher = "auto"
# zellij mouse handling:
# disabled forwards wheel scrolling to the host terminal instead of zellij
# enabled keeps zellij pane-click and wheel handling
zellij_mouse_mode = "disabled"

[token_refresh]
enabled = true
lead_time = "15m"
failure_retry_window = "10m"
retry_backoff = "exponential"
retry_initial_interval = "5s"
retry_max_interval = "60s"
# Opt-in: read GitHub App secrets once when refresher starts, then reuse them
# for background token mints to avoid repeated 1Password prompts.
cache_github_app_secrets = false
# If false, background refresh will never auto-run "op signin" (no popup
# interruptions), and will mark the session degraded until you re-auth manually.
background_auto_signin = true

[github_app]
app_id_ref = "op://<VAULT>/GitHub App/app-id"
private_key_ref = "op://<VAULT>/GitHub App/private-key"
installation_strategy = "by_owner"
installation_id_ref = ""
installation_id_map = {}

[browser]
# Engine type: chromium (--user-data-dir), firefox (-profile), open (URL only), none
engine = "chromium"
# macOS app name used by `open -na`.
#   chromium engine: "Google Chrome", "Brave Browser", "Microsoft Edge", "Chromium"
#   firefox engine:  "Firefox", "Firefox Developer Edition"
#   open engine:     "Safari", "Arc", or any app that accepts a URL argument
app = "Google Chrome"
# Linux binary name. Leave empty to auto-detect from common names.
# Examples: "google-chrome", "brave-browser", "firefox", "microsoft-edge"
binary = ""
# Per-project profile directory root. Set to "" to use default browser profile
# (no isolation). Applies to chromium and firefox engines only.
profiles_dir = "~/Library/Application Support/Chrome-ProjectProfiles"

[features]
# Optional packages to include when building agent images.
# Package names are treated as apt packages, except "uv" and "bun"
# which use their upstream installer scripts.
packages = []
# Optional host mounts for agent containers.
# Each entry can be:
# - a string path (mounted read-only at same absolute path), or
# - a table: { host_path = "...", container_path = "...", mode = "ro|rw" }
mounts = []

[security]
# Host-side paths under the worktree to overlay as read-only in containers.
protected_paths = [".git/hooks", ".git/config", ".github", ".gitmodules"]
# Relative to repo root unless absolute.
seccomp_profile = "docker/seccomp-profile.json"

[security.auth_mount_mode]
# Mount mode controls for auth passthrough paths (ro|rw).
# Paths that contain installed binaries or config should be "ro" to prevent
# container auto-updaters from overwriting host files with wrong-platform
# binaries.  Only paths that need container writes should be "rw".
codex_dot_codex = "rw"
claude_dot_claude = "rw"
claude_config = "rw"
claude_state = "rw"
claude_share = "ro"
claude_cache = "rw"

[agents.claude]
base_command = "claude"
safe_args = []
permissive_args = ["--dangerously-skip-permissions"]
api_key_env = "ANTHROPIC_API_KEY"
# Optional when using local CLI auth via defaults.auth_passthrough or sandbox=none.
api_key_ref = "op://<VAULT>/Anthropic/api-key"

[agents.codex]
base_command = "codex"
safe_args = ["--no-alt-screen"]
permissive_args = ["--no-alt-screen", "--dangerously-bypass-approvals-and-sandbox"]
api_key_env = "OPENAI_API_KEY"
# Set to "" when relying on Codex CLI login instead of an API key.
api_key_ref = "op://<VAULT>/OpenAI/api-key"

[agents.opencode]
base_command = "opencode"
safe_args = []
permissive_args = []
api_key_env = "OPENAI_API_KEY"
api_key_ref = "op://<VAULT>/OpenAI/api-key"

[agents.gemini]
base_command = "gemini"
safe_args = []
permissive_args = ["--yolo"]
api_key_env = "GOOGLE_API_KEY"
api_key_ref = "op://<VAULT>/Google AI/api-key"
