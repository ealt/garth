[defaults]
agents = ["claude", "codex"]
sandbox = "docker"                     # "docker", "host"
network = "bridge"                     # "bridge", "host", "none"
safety_mode = "permissive"             # "safe", "permissive"
docker_image_prefix = "garth"
auth_passthrough = ["claude", "codex"]
terminal_launcher = "current_shell"    # "ghostty", "terminal_app", "current_shell"
zellij_mouse_mode = "enabled"          # "enabled", "disabled"

[token_refresh]
enabled = true
lead_time = "15m"
failure_retry_window = "10m"
retry_backoff = "exponential"   # "exponential", "fixed"
retry_initial_interval = "5s"
retry_max_interval = "60s"
cache_github_app_secrets = true
background_auto_signin = false

[github_app]
app_id_ref = "op://Employee/GitHub App - Garth/app-id"
private_key_ref = "op://Employee/GitHub App - Garth/ealt-garth.2026-02-26.private-key.pem"
installation_strategy = "by_owner"                                                         # "single", "static_map", "by_owner"
installation_id_ref = "op://Employee/GitHub App - Garth/installation-id"
installation_id_map = {}

[browser]
engine = "chromium"                                                   # "chromium", "firefox", "url_only"
app = "Google Chrome"
profiles_dir = "~/Library/Application Support/Chrome-ProjectProfiles"

[features]
packages = ["neovim", "uv", "bun", "shellcheck"]
mounts = [
  { host_path = "~/.config/nvim", container_path = "/home/agent/.config/nvim", mode = "ro" }, # mode: "ro", "rw"
  { host_path = "~/Documents/toolchain", mode = "ro" },                                       # mode: "ro", "rw"
]

[agents.claude]
base_command = "claude"
safe_args = []
permissive_args = ["--dangerously-skip-permissions"]
api_key_env = "ANTHROPIC_API_KEY"
api_key_ref = ""

[agents.codex]
base_command = "codex"
safe_args = []
permissive_args = ["--dangerously-bypass-approvals-and-sandbox"]
api_key_env = "OPENAI_API_KEY"
api_key_ref = ""

[agents.opencode]
base_command = "opencode"
safe_args = []
permissive_args = []
api_key_env = "OPENAI_API_KEY"
api_key_ref = ""

[agents.gemini]
base_command = "gemini"
safe_args = []
permissive_args = ["--yolo"]
api_key_env = "GOOGLE_API_KEY"
api_key_ref = ""

[security.auth_mount_mode]
claude_share = "ro"      # "ro", "rw"
claude_dot_claude = "rw"
claude_config = "ro"     # "ro", "rw"
claude_state = "rw"
claude_cache = "rw"      # "ro", "rw"
